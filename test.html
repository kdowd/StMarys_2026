      <!-- main content start -->
      <main class="content">
        <form class="signup-form">
          <h3>Details:</h3>

          <label for="name">Name:</label>
          <input type="text" autocomplete="on" id="name" name="user_name" required placeholder="full name:" />
          <hr />
          <label for="mail">Email:</label>
          <input type="email" id="mail" name="user_email" required placeholder="email:" />
          <hr />
          <label for="msg">Message:</label>
          <textarea id="msg" name="user_message" placeholder="optional message:"></textarea>
          <hr />
          <div class="button-wrap">
            <button type="reset">Reset</button>
            <button type="submit">Submit</button>
          </div>
        </form>

        <script>
          let outputData = true;
          let formElement = document.querySelector('.signup-form');
          if (formElement && outputData) {
            formElement.addEventListener('submit', (e) => {
              e.preventDefault();
              let currentForm = e.target;

              const formData = new FormData(currentForm);
              for (var pair of formData.entries()) {
                console.log(pair[0], pair[1]);
              }
            });
          }
        </script>
      </main>
